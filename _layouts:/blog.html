<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Articles · John Rambo Rajendran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8; --surface: #ffffff; --blue: #4a7fa5;
      --blue-soft: #d6e8f5; --blue-mid: #b8d4e8;
      --text: #1e2d3d; --text-mid: #4a5e72; --text-muted: #7a8fa0;
      --border: #dce6f0; --radius: 14px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 400; line-height: 1.7; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(240,244,248,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: 'Lora', serif; font-weight: 600; font-size: 1.15rem; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--blue); }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; }
    .nav-links a { text-decoration: none; font-size: 0.875rem; font-weight: 500; color: var(--text-mid); padding: 0.4rem 0.85rem; border-radius: 20px; transition: background 0.18s, color 0.18s; }
    .nav-links a:hover, .nav-links a.active { background: var(--blue-soft); color: var(--blue); }
    .page { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; }
    .blog-header { padding: 4rem 0 2.5rem; border-bottom: 1px solid var(--border); }
    .section-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.5rem; }
    .blog-header h1 { font-family: 'Lora', serif; font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
    .posts-list { padding: 2rem 0 5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .post-item {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center; gap: 1.5rem;
      text-decoration: none; color: inherit;
      transition: all 0.18s;
    }
    .post-item:hover { border-color: var(--blue-mid); box-shadow: 0 4px 16px rgba(74,127,165,0.08); transform: translateY(-2px); }
    .post-left { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 0; }
    .post-tag { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); background: var(--blue-soft); padding: 0.15rem 0.55rem; border-radius: 4px; width: fit-content; }
    .post-title { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.4; color: var(--text); }
    .post-item:hover .post-title { color: var(--blue); }
    .post-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem; flex-shrink: 0; }
    .post-date { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    .post-arrow { color: var(--text-muted); font-size: 1rem; }
    footer { border-top: 1px solid var(--border); padding: 1.75rem 0; display: flex; justify-content: space-between; align-items: center; }
    footer p { font-size: 0.8rem; color: var(--text-muted); }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--blue); }
    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .blog-header { padding: 2.5rem 0 1.5rem; }
      .post-item { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .post-right { flex-direction: row; align-items: center; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">John Rambo<span>.</span></a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/blog/" class="active">Writing</a></li>
    <li><a href="/#connect">Connect</a></li>
  </ul>
</nav>
<div class="page">
  <div class="blog-header">
    <p class="section-label">Writing</p>
    <h1>All Articles</h1>
  </div>
  <div class="posts-list">
    {% for post in site.posts %}
    <a href="{{ post.url }}" class="post-item">
      <div class="post-left">
        {% if post.tags.size > 0 %}<span class="post-tag">{{ post.tags | first }}</span>{% endif %}
        <div class="post-title">{{ post.title }}</div>
      </div>
      <div class="post-right">
        <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
        <span class="post-arrow">→</span>
      </div>
    </a>
    {% endfor %}
  </div>
  <footer>
    <p>©2026 John Rambo Rajendran · Chennai, India</p>
    <p><a href="/">← Back to home</a></p>
  </footer>
</div>
</body>
</html>
